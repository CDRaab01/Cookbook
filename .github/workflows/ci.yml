name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 08:00 UTC) so "green" stays meaningful between pushes.
    # Deploy is guarded against scheduled runs (see deploy.yml) so this never ships.
    - cron: "0 8 * * 1"

# Signed release publishing moved to release.yml (auto on main pushes that touch android/**).
# This workflow is server checks + Android tests + debug build for push/PR only.

# The Android jobs check the repo out into Cookbook/ and the sibling Pulse repo into Pulse/, so
# the composite build's includeBuild("../../Pulse") (relative to Cookbook/android) resolves inside
# the workspace. Pulse is public, so the default token suffices; if it ever goes private, give
# those checkout steps a PAT via `token:`.

jobs:
  # ── Server ────────────────────────────────────────────────────────────────

  server-lint:
    name: "Server — Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.4.4
      - run: ruff check app
        working-directory: server
      - run: ruff format --check app
        working-directory: server

  server-test:
    name: "Server — Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cookbook
          POSTGRES_PASSWORD: cookbook
          POSTGRES_DB: cookbook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://cookbook:cookbook@localhost:5432/cookbook_test
      SECRET_KEY: ci-test-secret-key-not-for-production
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest tests/ -v --tb=short

  # ── Android ───────────────────────────────────────────────────────────────

  android-test:
    name: "Android — Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Cookbook/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Cookbook
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "server.url=${{ vars.COOKBOOK_SERVER_URL || 'https://cookbook.dragonflymedia.org/' }}" >> local.properties
      # Exclude Robolectric NATIVE-graphics screenshot tests from the gating job (they download a
      # large android-all runtime and can stall CI); they run on demand in the screenshots job.
      - run: ./gradlew :app:testDebugUnitTest --no-daemon -PexcludeScreenshots

  android-screenshots:
    name: "Android — UI Screenshots"
    runs-on: ubuntu-latest
    # Manual-only: the Robolectric native-graphics path is flaky on CI, so it doesn't gate
    # push/PR (or the auto-deploy). Run from the Actions tab to record/compare screenshots.
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Cookbook/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Cookbook
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "server.url=${{ vars.COOKBOOK_SERVER_URL || 'https://cookbook.dragonflymedia.org/' }}" >> local.properties
      - run: >-
          ./gradlew :app:testDebugUnitTest
          --tests "com.cookbook.screenshot.ScreenshotTest"
          --no-daemon -Proborazzi.test.compare=true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ui-screenshots-${{ github.sha }}
          path: |
            Cookbook/android/app/screenshots/**
            Cookbook/android/app/build/outputs/roborazzi/**
          retention-days: 30

  android-build:
    name: "Android — Assemble Debug APK"
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: Cookbook/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Cookbook
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "server.url=${{ vars.COOKBOOK_SERVER_URL || 'https://cookbook.dragonflymedia.org/' }}" >> local.properties
      - run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: cookbook-debug-${{ github.sha }}
          path: Cookbook/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
